<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançar Faturamento</title>
<style>
  :root{--plum:#7A1F4B;--rose:#C2185B;--pink:#F8BBD0;--blush:#FCE4EC;--ink:#3E2723;--ok:#2e7d32;--bad:#c62828;
        --blue:#1565C0;--blue2:#0D47A1;--bluelt:#BBDEFB;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Century Gothic","Segoe UI",system-ui,sans-serif;color:var(--ink);
       background:linear-gradient(135deg,#fde7f0,#fff,#fce4ec);min-height:100vh;padding:20px 12px;transition:background .3s;}
  body.alisson{background:linear-gradient(135deg,#e3f0fd,#fff,#e8f1fc);}
  .wrap{max-width:460px;margin:0 auto;}
  .card{background:#fff;border-radius:20px;box-shadow:0 10px 30px rgba(122,31,75,.13);overflow:hidden;margin-bottom:18px;}
  header{background:linear-gradient(135deg,var(--plum),var(--rose));color:#fff;padding:24px;text-align:center;transition:background .3s;}
  body.alisson header{background:linear-gradient(135deg,var(--blue2),var(--blue));}
  header h1{margin:0;font-size:1.4rem;}
  header p{margin:6px 0 0;opacity:.9;font-style:italic;font-size:.9rem;}
  form{padding:22px;}
  label{display:block;font-weight:bold;color:var(--plum);margin:14px 0 6px;font-size:.92rem;}
  body.alisson label{color:var(--blue2);}
  input,textarea{width:100%;font:inherit;padding:14px;border:1.6px solid var(--pink);border-radius:13px;color:var(--ink);background:#fffafc;}
  body.alisson input,body.alisson textarea{border-color:var(--bluelt);background:#fafdff;}
  input:focus,textarea:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(194,24,91,.15);}
  body.alisson input:focus,body.alisson textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.15);}
  #valor{font-size:1.6rem;font-weight:bold;text-align:center;color:var(--rose);}
  body.alisson #valor{color:var(--blue);}
  /* Seletor de empresa */
  .seg{display:flex;gap:10px;}
  .seg-btn{flex:1;cursor:pointer;border:2px solid var(--pink);background:#fff;border-radius:14px;
           padding:12px 8px;text-align:center;font:inherit;color:var(--ink);line-height:1.2;transition:.15s;}
  .seg-btn .em{font-weight:bold;display:block;font-size:.98rem;}
  .seg-btn .at{font-size:.74rem;opacity:.7;}
  .seg-btn.active{border-color:var(--rose);background:var(--blush);box-shadow:0 4px 12px rgba(194,24,91,.18);}
  .seg-btn[data-emp="alisson"].active{border-color:var(--blue);background:#e8f1fc;box-shadow:0 4px 12px rgba(21,101,192,.18);}
  .btn{width:100%;margin-top:20px;background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;
       border:none;border-radius:14px;padding:16px;font-size:1.1rem;font-weight:bold;cursor:pointer;transition:background .3s;}
  body.alisson .btn{background:linear-gradient(135deg,var(--blue),var(--blue2));}
  .btn:active{transform:scale(.98);}
  .btn[disabled]{opacity:.6;}
  .toast{margin:0 22px 18px;padding:14px;border-radius:12px;font-weight:bold;text-align:center;display:none;}
  .t-ok{background:#e6f4ea;color:var(--ok);display:block;}
  .t-bad{background:#fdecea;color:var(--bad);display:block;}
  h2{margin:0;background:var(--pink);color:var(--plum);padding:11px 22px;font-size:.95rem;transition:.3s;}
  body.alisson h2{background:var(--bluelt);color:var(--blue2);}
  ul{list-style:none;margin:0;padding:8px 22px 18px;}
  li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f3d4e1;font-size:.92rem;}
  li:last-child{border:none;}
  li .v{font-weight:bold;color:var(--rose);}
  body.alisson li .v{color:var(--blue);}
  .links{padding:0 22px 20px;text-align:center;}
  .links a{color:var(--rose);font-weight:bold;text-decoration:none;}
  body.alisson .links a{color:var(--blue);}
  .small{font-size:.78rem;color:#9a6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <header>
      <h1>Lançar Faturamento</h1>
      <p id="subtitulo">Manicure &amp; Pedicure — Adriana</p>
    </header>
    <div class="toast" id="toast"></div>
    <form id="form">
      <label>Empresa</label>
      <div class="seg" id="seg">
        <button type="button" class="seg-btn" data-emp="adriana"><span class="em">💅 Adriana</span><span class="at">Manicure</span></button>
        <button type="button" class="seg-btn" data-emp="alisson"><span class="em">💻 Alisson</span><span class="at">Digitação</span></button>
      </div>
      <label for="data">Data</label>
      <input type="date" id="data" required>
      <label for="valor">Valor recebido (R$)</label>
      <input type="text" id="valor" inputmode="decimal" placeholder="0,00" required>
      <label for="desc">Descrição (opcional)</label>
      <input type="text" id="desc" placeholder="ex.: unha em gel, pé e mão...">
      <button class="btn" id="btn" type="submit">Lançar faturamento</button>
    </form>
  </div>

  <div class="card">
    <h2 id="tituloLista">Últimos lançamentos enviados</h2>
    <ul id="lista"><li class="small" style="border:none;justify-content:center;">Nenhum lançamento ainda.</li></ul>
    <div class="links"><a id="abrirPlanilha" href="#" target="_blank">Abrir a planilha completa ↗</a></div>
  </div>

</div>

<script>
// Link único do Web App (não precisa configurar em nenhum aparelho)
const WEBAPP_URL="https://script.google.com/macros/s/AKfycbzp4G4K184y_MYEYafUp1-5LayKSFUBZCkV-wyMLVAW_1LuhRE0pz47LqF7Zts7v2Pf/exec";

// Empresas atendidas pelo mesmo painel (uma planilha por CNPJ)
const EMPRESAS={
  adriana:{
    subtitulo:"Manicure & Pedicure — Adriana",
    placeholder:"ex.: unha em gel, pé e mão...",
    sheet:"https://docs.google.com/spreadsheets/d/1hvSz38lM8UNEMXsJG2bqxmWIoASBRX-9vliqTynaBKU/edit"
  },
  alisson:{
    subtitulo:"Digitação & Apoio Administrativo — Alisson",
    placeholder:"ex.: digitação de documentos...",
    sheet:"https://docs.google.com/spreadsheets/d/1hvSz38lM8UNEMXsJG2bqxmWIoASBRX-9vliqTynaBKU/edit"
  }
};

const K_LAST="mei_ultimos";
const K_EMP="mei_empresa";
const $=id=>document.getElementById(id);
const brl=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

// empresa selecionada (lembra a última escolha neste aparelho)
let empresaAtual=localStorage.getItem(K_EMP)||"adriana";
if(!EMPRESAS[empresaAtual])empresaAtual="adriana";

// data padrão = hoje (data LOCAL do aparelho, sem deslocamento de fuso)
function hojeLocal(){
  const d=new Date();
  const mm=String(d.getMonth()+1).padStart(2,"0");
  const dd=String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${mm}-${dd}`;
}
$("data").value=hojeLocal();

function aplicarEmpresa(){
  const cfg=EMPRESAS[empresaAtual];
  document.body.classList.toggle("alisson",empresaAtual==="alisson");
  $("subtitulo").textContent=cfg.subtitulo;
  $("desc").placeholder=cfg.placeholder;
  // botões do seletor
  document.querySelectorAll(".seg-btn").forEach(b=>{
    b.classList.toggle("active",b.dataset.emp===empresaAtual);
  });
  // link da planilha correspondente
  const a=$("abrirPlanilha");
  a.href=cfg.sheet;a.style.display="inline";
  renderLista();
}

document.querySelectorAll(".seg-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    empresaAtual=b.dataset.emp;
    localStorage.setItem(K_EMP,empresaAtual);
    aplicarEmpresa();
  });
});

function parseBR(s){
  if(!s)return 0;
  s=String(s).replace(/[^\d,.-]/g,"").replace(/\./g,"").replace(",",".");
  const n=parseFloat(s);return isNaN(n)?0:n;
}

function mostrar(msg,tipo){
  const t=$("toast");t.textContent=msg;t.className="toast "+(tipo==="ok"?"t-ok":"t-bad");
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.className="toast",4000);
}

function renderLista(){
  const arr=JSON.parse(localStorage.getItem(K_LAST)||"[]").filter(e=>(e.emp||"adriana")===empresaAtual);
  const ul=$("lista");
  if(!arr.length){ul.innerHTML='<li class="small" style="border:none;justify-content:center;">Nenhum lançamento ainda.</li>';return;}
  ul.innerHTML=arr.slice(0,8).map(e=>{
    const d=e.data.split("-").reverse().join("/");
    return `<li><span>${d}${e.desc?' — '+e.desc:''}</span><span class="v">${brl(e.valor)}</span></li>`;
  }).join("");
}

aplicarEmpresa();

$("form").addEventListener("submit",async e=>{
  e.preventDefault();
  const valor=parseBR($("valor").value);
  const data=$("data").value;
  const desc=$("desc").value.trim();
  if(valor<=0){mostrar("Digite um valor válido.","bad");return;}
  $("btn").disabled=true;$("btn").textContent="Enviando...";
  try{
    await fetch(WEBAPP_URL,{method:"POST",mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({empresa:empresaAtual,data,valor,descricao:desc})});
    // feedback otimista (no-cors não permite ler a resposta)
    const arr=JSON.parse(localStorage.getItem(K_LAST)||"[]");
    arr.unshift({emp:empresaAtual,data,valor,desc});
    localStorage.setItem(K_LAST,JSON.stringify(arr.slice(0,40)));
    renderLista();
    mostrar("Lançado! "+brl(valor)+" em "+data.split("-").reverse().join("/"),"ok");
    $("valor").value="";$("desc").value="";
  }catch(err){
    mostrar("Falha ao enviar. Verifique a internet e o link configurado.","bad");
  }finally{
    $("btn").disabled=false;$("btn").textContent="Lançar faturamento";
  }
});
</script>
</body>
</html>
